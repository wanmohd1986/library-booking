<!DOCTYPE html>
<html>
<head>
    <title>Sistem Tempahan Perpustakaan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>📚 Sistem Tempahan Perpustakaan</h3>
        </div>

        <div class="card-body">
            <form action="/book" method="post">

                <div class="mb-3">
                    <label>Nama Guru</label>
                    <input type="text" class="form-control" name="nama" required>
                </div>

                <div class="mb-3">
                    <label>Tarikh</label>
                    <input type="date" class="form-control" name="tarikh" required>
                </div>

                <div class="mb-3">
    <label>Masa Mula</label>
    <input type="time" class="form-control" name="masa_mula" required>
</div>

<div class="mb-3">
    <label>Masa Tamat</label>
    <input type="time" class="form-control" name="masa_tamat" required>
</div>

                <div class="mb-3">
                    <label>Tujuan</label>
                    <input type="text" class="form-control" name="tujuan">
                </div>

                <button class="btn btn-primary">
                    Tempah
                </button>

                <a href="/list" class="btn btn-success">
                    Lihat Tempahan
                </a>

            </form>
        </div>
    </div>
</div>

</body>
</html>
